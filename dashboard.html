<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmicsClaw Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0D0D0D; color: #E5E5E5; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
        }
        
        /* Header */
        .header { 
            background: linear-gradient(180deg, #1A1A1A 0%, #141414 100%); 
            padding: 16px 24px; 
            border-bottom: 1px solid #2A2A2A; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .header h1 { 
            font-size: 18px; 
            font-weight: 600; 
            color: #3B82F6; 
            letter-spacing: -0.02em;
        }
        .status-bar { 
            display: flex; 
            gap: 24px; 
            font-size: 13px; 
            color: #888;
        }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-dot.online { background: #22C55E; }
        .status-dot.offline { background: #444; }
        
        /* Layout */
        .container { display: flex; min-height: calc(100vh - 60px); }
        
        /* Sidebar */
        .sidebar { 
            width: 200px; 
            background: #111; 
            border-right: 1px solid #1A1A1A; 
            padding: 16px 0;
        }
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 12px;
            padding: 12px 20px; 
            color: #666; 
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
        }
        .nav-item:hover { 
            background: #151515; 
            color: #999; 
        }
        .nav-item.active { 
            background: #1a1a1a; 
            color: #3B82F6; 
            border-left-color: #3B82F6;
        }
        .nav-icon { width: 18px; text-align: center; font-size: 14px; }
        
        /* Main Content */
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Page Title */
        .page-title { 
            font-size: 20px; 
            font-weight: 600; 
            color: #FFF; 
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1A1A1A;
        }
        
        /* Cards */
        .card { 
            background: #141414; 
            border: 1px solid #1F1F1F; 
            border-radius: 8px; 
            padding: 16px; 
            margin-bottom: 12px;
        }
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 12px;
        }
        .card-title { 
            font-size: 14px; 
            font-weight: 600; 
            color: #CCC;
        }
        .card-badge { 
            font-size: 11px; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: 500;
        }
        .badge-running { background: #1E3A5F; color: #3B82F6; }
        .badge-done { background: #14532D; color: #22C55E; }
        .badge-failed { background: #450A0A; color: #EF4444; }
        .badge-pending { background: #451C03; color: #F59E0B; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            padding: 10px 12px; 
            font-size: 11px; 
            font-weight: 600; 
            color: #555; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            border-bottom: 1px solid #1A1A1A;
        }
        td { 
            padding: 12px; 
            font-size: 13px; 
            color: #AAA;
            border-bottom: 1px solid #151515;
        }
        tr:hover td { background: #151515; }
        
        /* Skill Items */
        .skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #181818;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .skill-name { font-weight: 600; color: #DDD; font-size: 14px; }
        .skill-scope { font-size: 12px; color: #666; margin-top: 2px; }
        .skill-id { 
            font-size: 11px; 
            padding: 2px 6px; 
            background: #222; 
            border-radius: 3px; 
            color: #3B82F6;
            font-family: monospace;
        }
        
        /* Info Grid */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .info-box { 
            background: #141414; 
            border: 1px solid #1F1F1F; 
            border-radius: 6px; 
            padding: 16px;
        }
        .info-label { font-size: 11px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 14px; color: #CCC; }
        
        /* Code */
        code { 
            font-family: "SF Mono", Monaco, monospace; 
            font-size: 12px; 
            background: #1A1A1A; 
            padding: 2px 6px; 
            border-radius: 3px; 
            color: #3B82F6;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OmicsClaw</h1>
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot offline" id="serverDot"></span>
                <span id="serverStatus">0/0 Servers</span>
            </div>
            <div class="status-item">
                <span class="status-dot offline" id="jobDot"></span>
                <span id="jobStatus">0 Tasks</span>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="nav-item active" onclick="showPage('jobs', this)">
                <span class="nav-icon">T</span>
                <span>Tasks</span>
            </div>
            <div class="nav-item" onclick="showPage('servers', this)">
                <span class="nav-icon">S</span>
                <span>Servers</span>
            </div>
            <div class="nav-item" onclick="showPage('skills', this)">
                <span class="nav-icon">K</span>
                <span>Skills</span>
            </div>
            <div class="nav-item" onclick="showPage('config', this)">
                <span class="nav-icon">C</span>
                <span>Config</span>
            </div>
        </div>
        
        <div class="main">
            <!-- Tasks Page -->
            <div id="jobs" class="page active">
                <div class="page-title">Tasks</div>
                <div id="jobsList"></div>
            </div>
            
            <!-- Servers Page -->
            <div id="servers" class="page">
                <div class="page-title">Servers</div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Host</th>
                            <th>Port</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="serversList"></tbody>
                </table>
            </div>
            
            <!-- Skills Page -->
            <div id="skills" class="page">
                <div class="page-title">Skills</div>
                <div id="skillsList"></div>
            </div>
            
            <!-- Config Page -->
            <div id="config" class="page">
                <div class="page-title">Config</div>
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">API Port</div>
                        <div class="info-value">19766</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Dashboard Port</div>
                        <div class="info-value">7860</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">WebSocket</div>
                        <div class="info-value">19765</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Data Directory</div>
                        <div class="info-value">data/</div>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">Commands</div>
                    <div style="margin-top: 12px; font-size: 13px; color: #666; line-height: 1.8;">
                        <div><code>bash restart.sh</code> - Restart bot</div>
                        <div><code>tail -f /tmp/omicsclaw_bot.log</code> - View logs</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API = '/api';
    
    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    
    async function apiGet(url) {
        try { return await fetch(API + url).then(r => r.json()); } catch { return {}; }
    }
    
    async function updateStatus() {
        const s = await apiGet('/stats');
        document.getElementById('serverStatus').innerText = (s.servers_online || 0) + '/' + (s.servers || 0) + ' Servers';
        document.getElementById('serverDot').className = 'status-dot ' + ((s.servers_online > 0) ? 'online' : 'offline');
        document.getElementById('jobStatus').innerText = (s.jobs_running || 0) + ' Running';
        document.getElementById('jobDot').className = 'status-dot ' + ((s.jobs_running > 0) ? 'online' : 'offline');
    }
    
    async function loadJobs() {
        const jobs = await apiGet('/jobs');
        if (!jobs.length) {
            document.getElementById('jobsList').innerHTML = '<div class="card"><div style="color:#555;text-align:center;padding:20px;">No active tasks</div></div>';
            return;
        }
        let html = '';
        jobs.forEach(j => {
            const statusClass = {'running': 'badge-running', 'done': 'badge-done', 'failed': 'badge-failed', 'pending': 'badge-pending'}[j.status] || 'badge-pending';
            const statusText = {'running': 'Running', 'done': 'Done', 'failed': 'Failed', 'pending': 'Pending'}[j.status] || j.status;
            html += `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${j.job_id}</span>
                        <span class="card-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div style="font-size:13px;color:#888;margin-bottom:8px;">${j.description || 'N/A'}</div>
                    <div style="display:flex;gap:20px;font-size:12px;color:#555;">
                        <span>Dir: <code>${(j.workdir || '').substring(0,40)}</code></span>
                        <span>Time: ${j.elapsed || 'N/A'}</span>
                    </div>
                </div>
            `;
        });
        document.getElementById('jobsList').innerHTML = html;
    }
    
    async function loadServers() {
        const srvs = await apiGet('/servers');
        if (!srvs.length) {
            document.getElementById('serversList').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#555;padding:20px;">No servers configured</td></tr>';
            return;
        }
        let html = '';
        srvs.forEach(s => {
            html += `
                <tr>
                    <td style="color:#CCC;font-weight:600;">${s.server_id}</td>
                    <td><code>${s.host}</code></td>
                    <td>${s.port}</td>
                    <td><span class="card-badge ${s.online ? 'badge-done' : 'badge-failed'}">${s.online ? 'Online' : 'Offline'}</span></td>
                </tr>
            `;
        });
        document.getElementById('serversList').innerHTML = html;
    }
    
    async function loadSkills() {
        // Skills are loaded from the server at runtime - show static list for now
        const skills = [
            {id: 'ccc_cellchat', name: 'CellChat', scope: 'Cell communication analysis'},
            {id: 'deg_analysis', name: 'DEG', scope: 'Differential gene expression'},
            {id: 'gsea_enrichment', name: 'GSEA', scope: 'GO/KEGG enrichment'},
            {id: 'dimreduc_standard', name: 'DimReduc', scope: 'Standard clustering'},
            {id: 'annotation_sctype', name: 'Annotation', scope: 'Cell type annotation'},
            {id: 'batch_harmony', name: 'Batch', scope: 'Batch correction'}
        ];
        let html = '';
        skills.forEach(s => {
            html += `
                <div class="skill-item">
                    <div>
                        <div class="skill-name">${s.name}</div>
                        <div class="skill-scope">${s.scope}</div>
                    </div>
                    <span class="skill-id">${s.id}</span>
                </div>
            `;
        });
        document.getElementById('skillsList').innerHTML = html;
    }
    
    // Init
    updateStatus();
    loadJobs();
    loadServers();
    loadSkills();
    setInterval(() => { updateStatus(); loadJobs(); loadServers(); }, 5000);
    </script>
</body>
</html>
