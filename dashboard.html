<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>OmicsClaw Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0D0D0D; color: #FFF; font-family: -apple-system, sans-serif; min-height: 100vh; }
        .header { background: #1A1A1A; padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .header h1 { color: #3B82F6; }
        .status { color: #A0A0A0; }
        .container { display: flex; }
        .sidebar { width: 180px; background: #141414; padding: 20px; border-right: 1px solid #333; }
        .sidebar button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: transparent; color: #A0A0A0; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #1E1E1E; color: #FFF; }
        .sidebar button.active { background: #1E3A5F; color: #3B82F6; }
        .main { flex: 1; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #1E1E1E; border: 1px solid #333; border-radius: 8px; padding: 15px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #A0A0A0; font-size: 12px; }
        .online { color: #22C55E; }
        .offline { color: #EF4444; }
        .chat-box { height: 450px; background: #1E1E1E; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; }
        .chat-msg { margin: 8px 0; }
        .chat-msg .user { color: #3B82F6; }
        .chat-msg .bot { color: #A0A0A0; }
        input, button.send { padding: 10px; border-radius: 8px; border: none; }
        input { background: #1E1E1E; border: 1px solid #333; color: #FFF; flex: 1; }
        button.send { background: #3B82F6; color: #FFF; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧬 OmicsClaw</h1>
        <div class="status" id="statusBar">Loading...</div>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="active" onclick="showPage('jobs')">📋 任务</button>
            <button onclick="showPage('servers')">🖥️ 服务器</button>
            <button onclick="showPage('chat')">💬 对话</button>
            <button onclick="showPage('config')">⚙️ 配置</button>
        </div>
        <div class="main">
            <div id="jobs" class="page active"><h2>📋 任务</h2><div id="jobsList"></div></div>
            <div id="servers" class="page"><h2>🖥️ 服务器</h2><div id="serversList"></div></div>
            <div id="chat" class="page">
                <h2>💬 对话</h2>
                <div class="chat-box" id="chatBox"></div>
                <div style="display:flex;">
                    <input type="text" id="chatInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMsg()">
                    <button class="send" onclick="sendMsg()">发送</button>
                </div>
            </div>
            <div id="config" class="page"><h2>⚙️ 配置</h2><div class="card"><p>API: 19766</p><p>Dashboard: 7860</p></div></div>
        </div>
    </div>
    <script>
    const API = '/api';
    const userID = '1479355442499948555';
    
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }
    
    async function apiGet(url) {
        try { return await fetch(API + url).then(r => r.json()); } catch { return {}; }
    }
    
    async function apiPost(url, data) {
        try { return await fetch(API + url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}).then(r => r.json()); } catch { return {}; }
    }
    
    async function updateStatus() {
        const s = await apiGet('/stats');
        document.getElementById('statusBar').innerText = `🖥️ ${s.servers_online||0}/${s.servers||0} | 📊 ${s.jobs_running||0}/${s.jobs||0}`;
    }
    
    async function loadJobs() {
        const jobs = await apiGet('/jobs');
        document.getElementById('jobsList').innerHTML = jobs.length ? jobs.map(j => `<div class="card"><b>${j.job_id}</b> ${j.status} | ${j.elapsed}</div>`).join('') : '<p>暂无任务</p>';
    }
    
    async function loadServers() {
        const srvs = await apiGet('/servers');
        document.getElementById('serversList').innerHTML = srvs.length ? `<table><tr><th>服务器</th><th>地址</th><th>状态</th></tr>${srvs.map(s => `<tr><td><b>${s.server_id}</b></td><td>${s.host}:${s.port}</td><td class="${s.online?'online':'offline'}">${s.online?'🟢':'🔴'}</td></tr>`).join('')}</table>` : '<p>暂无服务器</p>';
    }
    
    async function sendMsg() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        const box = document.getElementById('chatBox');
        box.innerHTML += `<div class="chat-msg user">👤 ${msg}</div>`;
        box.innerHTML += `<div class="chat-msg bot">⏳ 处理中...</div>`;
        box.scrollTop = box.scrollHeight;
        input.value = '';
        const r = await apiPost('/chat', {message: msg, user_id: userID});
        box.lastElementChild.innerHTML = '🤖 ' + (r.text || '⚠️ 错误');
        box.scrollTop = box.scrollHeight;
    }
    
    updateStatus(); loadJobs(); loadServers();
    setInterval(() => { updateStatus(); loadJobs(); loadServers(); }, 5000);
    </script>
</body>
</html>
